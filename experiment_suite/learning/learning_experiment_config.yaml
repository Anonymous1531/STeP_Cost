output_root: "~/factory6_learning_results"

paths:
  mission_summary_path:     "~/.ros/mission_summary.json"
  mission_summary_out_path: "~/.ros/mission_summary_out.json"
  decay_table_path:         "~/.ros/decay_table.json"
  archive_path:             "~/.ros/llm_decay_rag_archive.json"
  loop_ready_signal_path: ~/.ros/obstacle_loop_ready.signal

topics:
  initialpose: "/initialpose"
  amcl_pose:   "/amcl_pose"
  goal_status_nav_to_pose:      "/navigate_to_pose/_action/status"
  goal_status_nav_through_poses: "/navigate_through_poses/_action/status"
  robot:
    entity_name:   "waffle"
    reset_service: "/gazebo/set_entity_state"

obstacle:
  controller_script: "~/STeP_Cost/experiment_suite/learning/learning_obstacle_controller.py"
  sdf_path: "~/STeP_Cost/experiment_suite/exp_person.sdf"

obstacle_types:
  person:
    sdf_path:           "~/STeP_Cost/experiment_suite/exp_person.sdf"
    speed_slow_mps:     0.08
    speed_fast_mps:     0.15
    speed_approach_mps: 2.00   
  forklift:
    sdf_path:           "~/STeP_Cost/experiment_suite/exp_mecanum.sdf"
    speed_slow_mps:     0.05
    speed_fast_mps:     0.25
    speed_approach_mps: 2.00
  cart:                          
    sdf_path: "~/STeP_Cost/experiment_suite/exp_cart.sdf"
    speed_slow_mps: 0.13
    speed_fast_mps: 0.20
    speed_approach_mps: 2.00

trial:
  timeout_s:                   800.0
  settle_s_after_initialpose:    2.0
  use_map_frame_for_path_length: true
  postrun_wait_s:               15.0   
  first_trial_obstacle_wait_s:   0.0  
  next_trial_obstacle_wait_min_s: 20.0   
  next_trial_obstacle_wait_max_s: 40.0  
  depart_wait_min_s: 0.0  
  depart_wait_max_s: 0.0  
  slow_spawn_ratio_min: 0.3  
  slow_spawn_ratio_max: 0.5  

calibration:
  enabled: false
  repeats_per_combination: 5  

convergence:
  consecutive_trials:   5      
  ttl_change_threshold: 0.05   
  max_trials:           200   

methods:
  ours_human:
    description: "Proposed method, human approval"

scenarios:
  short_aisle:
    mode: "navigate_to_pose"
    start: [0.0,  0.0, 0.0]
    goal:  [32.0, 0.0, 0.0]
    expected_shortest_path_m: 26.96
    gt_ttl_s_by_tag:
      person:slow:   600.0
      person:fast:   300.0
      forklift:slow: 1000.0
      forklift:fast:  430.0
      cart:slow:   600.0
      cart:fast:   333.0
    obstacle:
      frame:         "world"        
      entity_name:   "learning_obs"
      start_delay_s:  1.0
      standby: [-7.00, 9.27, 0.0] 
      enter:   [7.60, 9.27, 0.0] 
      exit:   [9.50, 9.27, 0.0]  
      exit2:    [9.50, 15.00, 0.0] 

frames:
  map_to_world:
    enabled: true
    dx:   -16.162
    dy:    8.98
    dyaw:  0.0
