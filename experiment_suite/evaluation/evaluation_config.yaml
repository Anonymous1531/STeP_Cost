output_root: "~/factory6_experiment_results"

paths:
  mission_summary_path: "~/.ros/mission_summary.json"
  mission_summary_out_path: "~/.ros/mission_summary_out.json"
  decay_table_path: "~/.ros/decay_table.json"
  archive_path: "~/.ros/llm_decay_rag_archive.json"

topics:
  initialpose: "/initialpose"
  amcl_pose:   "/amcl_pose"
  goal_status_nav_to_pose:       "/navigate_to_pose/_action/status"
  goal_status_nav_through_poses: "/navigate_through_poses/_action/status"
  robot:
    entity_name:   "waffle"
    reset_service: "/gazebo/set_entity_state"

obstacle:
  controller_script: "~/STeP_Cost/experiment_suite/evaluation/evaluation_obstacle_controller.py"
  sdf_path: "~/STeP_Cost/experiment_suite/exp_person.sdf"
  standby_random_ratio: 0.3

obstacle_types:
  person:
    sdf_path:           "~/STeP_Cost/experiment_suite/exp_person.sdf"
    speed_slow_mps:     0.08
    speed_fast_mps:     0.15
    speed_approach_mps: 2.00
  forklift:
    sdf_path:           "~/STeP_Cost/experiment_suite/exp_mecanum.sdf"
    speed_slow_mps:     0.05
    speed_fast_mps:     0.25
    speed_approach_mps: 2.00
  cart:
    sdf_path:           "~/STeP_Cost/experiment_suite/exp_cart.sdf"
    speed_slow_mps:     0.13
    speed_fast_mps:     0.20
    speed_approach_mps: 2.00

trial:
  timeout_s: 30000.0
  settle_s_after_initialpose: 2.0
  use_map_frame_for_path_length: true
  postrun_wait_s: 15.0

speed_classifier:
  threshold_mps: 0.07
  knn_min_samples: 10

methods:
  ros2_default:
    description: "Nav2 baseline without proposed online learning"
  ours_auto:
    description: "Proposed method, automatic LLM apply"
  ours_human:
    description: "Proposed method, human approval apply"
  transient:
    description: "Transient baseline, short TTL"
    detector: false
    llm_decay_enable: false
    fixed_ttl_s: 5.0 

scenarios:
  multi_corridor:
    mode: "navigate_through_poses"
    poses:
      - [0.0,    0.0,   0.0]
      - [32.0,   0.0,   0.0] 
      - [32.0,  -4.76,  0.0] 
      - [0.0,   -4.76,  0.0] 
      - [0.0,   -18.17, 0.0]   
      - [32.0,  -18.17, 0.0] 
      - [32.0,  -13.49, 0.0]  
      - [0.0,   -13.49, 0.0]  
    expected_shortest_path_m: 140.0

    corridors:
      - id: 1
        spawn_trigger_waypoint_idx: 0
        standby_x:  9.16 
        standby_y:  0.29
        enter_x:   23.76
        enter_y:    0.29
        exit_x:    25.66
        exit_y:     0.29
        exit2_x:   25.66
        exit2_y:    6.02

      - id: 2
        spawn_trigger_waypoint_idx: 2
        standby_x: 23.76
        standby_y: -4.47
        enter_x:    9.16
        enter_y:   -4.47
        exit_x:     7.26
        exit_y:    -4.47
        exit2_x:    7.26
        exit2_y:    6.02

      - id: 5
        spawn_trigger_waypoint_idx: 4
        standby_x:  9.16  
        standby_y: -17.88
        enter_x:   23.76
        enter_y:   -17.88
        exit_x:    25.66
        exit_y:    -17.88
        exit2_x:   25.66
        exit2_y:   -23.61

      - id: 4
        spawn_trigger_waypoint_idx: 6
        standby_x: 23.76  
        standby_y: -13.20
        enter_x:    9.16
        enter_y:   -13.20
        exit_x:     7.26
        exit_y:    -13.20
        exit2_x:    7.26
        exit2_y:   -23.61

    gt_ttl_s_by_tag:
      person:slow:   400.0
      person:fast:   213.0
      forklift:slow: 640.0
      forklift:fast:  97.0
      cart:slow:     246.0
      cart:fast:     160.0

experiments:
  learning:
    methods: ["ours_auto", "ours_human"]
    scenarios: ["multi_corridor"]
    repeats_per_scenario: 20

  evaluation:
    methods: ["transient", "permanent", "ours", "fixed"]
    scenarios: ["multi_corridor"]
    repeats_per_scenario: 10

frames:
  map_to_world:
    enabled: true
    dx:   -16.162
    dy:    8.98
    dyaw:  0.0
